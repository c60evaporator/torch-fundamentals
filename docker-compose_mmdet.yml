services:
  mmdet-dev:
    image: "${IMAGE_NAME:-mmdet-dev}:${IMAGE_TAG:-cu121}"
    # docker build options
    build:
      context: .
      dockerfile: docker/Dockerfile_mmdet
      # --build-arg option
      args:
        # CUDA and Ubuntu Versions
        CUDA_VERSION: "${CUDA_VERSION:-12.1.1}"
        UBUNTU_VERSION: "${UBUNTU_VERSION:-22.04}"
        # Python version
        PYTHON_VERSION: "${PYTHON_VERSION:-3.10}"
        # PyTorch versions
        TORCH_CUDA: "${TORCH_CUDA:-cu121}"
        TORCH_VERSION: "${TORCH_VERSION:-2.1.0}"
        # OpenMMLab versions
        MMENGINE_MINIMUM_VERSION: "${MMENGINE_MINIMUM_VERSION:-0.10.0}"
        MMCV_MINIMUM_VERSION: "${MMCV_MINIMUM_VERSION:-2.1.0}"
        # Match host UID/GID to avoid permission issues on bind mounts
        USERNAME: "${USERNAME:-developer}"
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"

    # Container name (--name option)
    container_name: mmdet_dev
    # Set resource sharing to host
    gpus: all  # --gpus
    ipc: host  # --ipc
    shm_size: "${SHM_SIZE:-16g}"  # --shm-size
    # Stable operation for development
    init: true  # --init option
    stdin_open: true  # -i option
    tty: true  # -t option
    # Set startup directory
    working_dir: /workspace

    # Environment variables (-e option)
    environment:
      # Base path for datasets inside the container
      DATASET_ROOT: "/workspace/data"
    
    # Volume mounts
    volumes:
      # Project (str, settings etc. managed by Git)
      - .:/workspace
